# Let's Encrypt staging環境向けのClusterIssuer。
# まずこれで argocd.mamelly.com / workflows.mamelly.com の証明書発行が
# 問題なく通ることを確認してから、production版に切り替える。
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: yk050696@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
        selector:
          dnsZones:
            - mamelly.com
