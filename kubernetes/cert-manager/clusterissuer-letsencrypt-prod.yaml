# Let's Encrypt production環境向けのClusterIssuer。
# staging(clusterissuer-letsencrypt-staging.yaml)でDNS-01チャレンジが
# 通ることを確認済み。実際のIngressのtls.issuerRefではこちらを指定する。
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: yk050696@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
        selector:
          dnsZones:
            - mamelly.com
