# Slack → Notion 同期（work/app/test/main.py）用 Secret のひな形。
#
#   cp secret-slack-notion-sync-workflow.yaml secret-slack-notion-sync-workflow.local.yaml
#   # 各値を差し替え（Bot か User のどちらか一方のトークンだけでも可）
#
# Git に載せる場合は平文をコミットせず SOPS（推奨: age・クラウド KMS 不要）または Sealed Secrets で暗号化してください。
#   kubernetes/gitops/secrets-gitops.md（初回は kubernetes/argo-workflows/.sops.yaml.example を .sops.yaml にコピー）
# GitOps でコミットするファイル例: secret-slack-notion-sync-workflow.sops.yaml（平文は *.local.yaml のみ）
#
# ワンショット適用のみなら:
#   kubectl apply -f secret-slack-notion-sync-workflow.local.yaml
#
# ※ *.local.yaml と実トークンは .gitignore 対象。Credential をコミットしないでください。
---
apiVersion: v1
kind: Secret
metadata:
  name: argo-workflows-slack-notion
  namespace: argo
type: Opaque
stringData:
  slack_bot_token: ""
  slack_user_token: ""
  my_dm_channel_id: ""
  slack_user_id: ""
  notion_token: "REPLACE_WITH_NOTION_INTEGRATION_SECRET"
  notion_page_id: "REPLACE_WITH_NOTION_PAGE_ID"
