# argocd-server をブラウザから https://argocd.mamelly.com で参照するためのIngress。
# server.insecure=true (argocd-cmd-params-cm) によりargocd-serverはplain HTTPで
# 8080番をlistenしているため、IngressでTLS終端する構成にしている。
#
# アクセス制御はIPAllowListではなくTailscaleのtailnetメンバーシップ + SSO(Dex/Google)で行う。
# (klipper-lbがソースIPをMASQUERADEするため、Traefikからは本来のクライアントIPが見えない)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argocd.mamelly.com
      secretName: argocd-server-tls
  rules:
    - host: argocd.mamelly.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: http
