apiVersion: apps/v1 # 使用するAPIのバージョン
kind: Deployment # liveness / readiness の動作確認用
metadata: # オブジェクトを一意に特定するための情報
  name: study-probes-app # Deployment名
spec: # オブジェクトの望ましい状態
  replicas: 1
  selector:
    matchLabels:
      app: demo-probes
  template:
    metadata:
      labels:
        app: demo-probes
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        livenessProbe: # 失敗が続くとコンテナが再起動される
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe: # 失敗中は Service の Endpoints から外れる
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
        startupProbe: # 起動が遅いアプリ向け（任意）
          httpGet:
            path: /
            port: 80
          failureThreshold: 30
          periodSeconds: 5
