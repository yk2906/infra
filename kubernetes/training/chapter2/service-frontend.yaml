apiVersion: v1 # 使用するAPIのバージョン
kind: Service # Pod集合への安定したネットワークエンドポイント
metadata: # オブジェクトを一意に特定するための情報
  name: study-frontend-svc # Service名（同一ネームスペース内のDNS名になる）
spec: # Serviceの望ましい状態
  type: ClusterIP # クラスタ内部向け（NodePort/LoadBalancerと比較して学ぶ）
  selector: # トラフィックを送るPodのラベル（Deploymentのtemplate.labelsと一致）
    app: demo-frontend
  ports: # ポートマッピング
  - port: 80 # Serviceのポート
    targetPort: 80 # Podのコンテナポート
