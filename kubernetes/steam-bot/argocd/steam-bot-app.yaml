apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: steam-bot-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yk2906/infra.git
    targetRevision: HEAD
    path: steam-bot/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
