apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: weather-workflow
  labels:
    app: weather
    component: batch
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "get", "patch", "delete"]
