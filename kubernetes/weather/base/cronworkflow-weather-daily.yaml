# クラスターに Argo Workflows が入っていることが前提（CRD: workflows.argoproj.io）
# Discord 通知: namespace weather に Secret discord-token（token, channel_id）が必要。
# steam-bot と同じ Bot トークン・チャンネル ID を使う（Secret は namespace ごとに配置）。
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: weather-tomorrow-forecast
  labels:
    app: weather
    component: batch
spec:
  schedules:
    - "0 19 * * *"
  timezone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    serviceAccountName: weather-workflow
    entrypoint: fetch-tomorrow-weather
    templates:
      - name: fetch-tomorrow-weather
        container:
          image: weather-image:latest
          imagePullPolicy: Always
          env:
            - name: LATITUDE
              value: "35.6762"
            - name: LONGITUDE
              value: "139.6503"
            - name: TIMEZONE
              value: "Asia/Tokyo"
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-token
                  key: token
            - name: DISCORD_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: discord-token
                  key: channel_id
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
