---
- name: Get system architecture
  ansible.builtin.set_fact:
    arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"

- name: Create temporary directory for download
  ansible.builtin.tempfile:
    state: directory
    suffix: k9s_install
  register: temp_dir

- name: Download k9s binary tarball
  ansible.builtin.get_url:
    url: "https://github.com/derailed/k9s/releases/download/{{ k9s_version }}/k9s_Linux_{{ arch }}.tar.gz"
    dest: "{{ temp_dir.path }}/k9s.tar.gz"

- name: Unarchive k9s binary
  ansible.builtin.unarchive:
    src: "{{ temp_dir.path }}/k9s.tar.gz"
    dest: "{{ temp_dir.path }}"
    remote_src: true

- name: Install k9s to binary path
  ansible.builtin.copy:
    src: "{{ temp_dir.path }}/k9s"
    dest: "{{ k9s_install_path }}/k9s"
    mode: "0755"
    remote_src: true

- name: Remove temporary directory
  ansible.builtin.file:
    path: "{{ temp_dir.path }}"
    state: absent

- name: Verify k9s installation
  ansible.builtin.command: k9s version
  register: k9s_check
  changed_when: false

- name: Show k9s version
  ansible.builtin.debug:
    msg: "k9s has been installed: {{ k9s_check.stdout_lines[0] }}"
