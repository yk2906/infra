---
# 制御マシン（localhost）に k9s を導入する playbook
# 既定値・上書き例は roles/k9s/defaults/main.yml を参照。
- name: Install k9s
  hosts: localhost
  connection: local
  become: true
  vars:
    k9s_version: "v0.32.4"
    install_path: "/usr/local/bin"
    # 後方互換: 従来の install_path を k9s_install_path に渡す
    k9s_install_path: "{{ install_path }}"
  roles:
    - role: k9s
