---
# k3s（軽量 Kubernetes）のインストール用 playbook
#
# 前提: Debian/Ubuntu 系（apt）。server と agent に対応。
# 注意: 同一ホストで kind など別の Kubernetes とポート（6443 等）が競合する場合があります。
# 起動失敗時は: sudo journalctl -xeu k3s.service
# 不完全な状態が残った場合: sudo /usr/local/bin/k3s-uninstall.sh のあと再実行
# 別ポートで立てる例: -e 'k3s_server_exec="--https-listen-port 6445"'
# Docker と併用で競合する場合（任意）: -e k3s_stop_docker_before=true
#
# 実行例（サーバー）:
#   ansible-playbook -i inventory install-k3s.yml -u ansible --private-key ~/.ssh/oci_terraform_key
#
# 実行例（エージェント）:
#   ansible-playbook -i inventory install-k3s.yml -u ansible \
#     -e k3s_node_role=agent \
#     -e k3s_url=https://<サーバーIP>:6443 \
#     -e k3s_token=<node-token>
#
- name: Install k3s
  hosts: all
  become: true
  vars:
    k3s_node_role: server
    # 例: v1.31.5+k3s1。空のままなら最新チャンネル
    k3s_version: ""
    # 例: "--disable traefik" や "--write-kubeconfig-mode 644"（server のみ）
    k3s_server_exec: ""
    # agent のみ必須
    k3s_url: ""
    k3s_token: ""
    # server で kubeconfig を配置するユーザー（空ならコピーしない）
    k3s_kubeconfig_user: k8s
    # リモートから kubectl する場合など、kubeconfig 内の API を差し替える（例: サーバーのグローバル IP）
    k3s_public_api: ""
    # server で、インストール前に API ポートが LISTEN していないか確認する（別ポート利用時は false または k3s_apiserver_port を合わせる）
    k3s_check_apiserver_port: true
    # k3s_server_exec に --https-listen-port を指定した場合は同じ番号にする
    k3s_apiserver_port: 6443
    # server で、k3s 未稼働時のみ Docker を止めてからインストール（kind 等が止まるので必要なときだけ true）
    k3s_stop_docker_before: false

  pre_tasks:
    - name: k3s_node_role の妥当性を確認する
      ansible.builtin.assert:
        that:
          - k3s_node_role in ['server', 'agent']
        fail_msg: "k3s_node_role は server または agent を指定してください。"

    - name: agent 向け変数を確認する
      ansible.builtin.assert:
        that:
          - k3s_url | length > 0
          - k3s_token | length > 0
        fail_msg: "agent の場合は k3s_url と k3s_token を指定してください。"
      when: k3s_node_role == 'agent'

  tasks:
    - name: 前提パッケージ（curl）を入れる
      ansible.builtin.apt:
        name: curl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: k3s server が稼働中か確認する
      ansible.builtin.command: systemctl is-active k3s
      register: k3s_server_active
      failed_when: false
      changed_when: false
      when: k3s_node_role == 'server'

    - name: k3s agent が稼働中か確認する
      ansible.builtin.command: systemctl is-active k3s-agent
      register: k3s_agent_active
      failed_when: false
      changed_when: false
      when: k3s_node_role == 'agent'

    - name: インストール前に API 用ポートが空いているか確認する
      ansible.builtin.shell: |
        set -euo pipefail
        if ss -tln 2>/dev/null | grep -qE ':{{ k3s_apiserver_port }}[[:space:]]'; then
          echo 'ポート {{ k3s_apiserver_port }} が使用中です。kind / 既存の Kubernetes / 以前の k3s を停止するか、k3s_server_exec に --https-listen-port <別番号> を指定し、k3s_apiserver_port も合わせてください。'
          ss -tlnp 2>/dev/null | grep '{{ k3s_apiserver_port }}' || ss -tln | grep '{{ k3s_apiserver_port }}' || true
          exit 1
        fi
      args:
        executable: /bin/bash
      register: k3s_port_check
      changed_when: false
      when:
        - k3s_node_role == 'server'
        - k3s_check_apiserver_port | default(true)
        - k3s_server_active.stdout | default('') != 'active'

    - name: k3s 導入前に Docker を止める（オプション）
      ansible.builtin.systemd:
        name: docker
        state: stopped
      when:
        - k3s_node_role == 'server'
        - k3s_stop_docker_before | default(false)
        - k3s_server_active.stdout | default('') != 'active'

    - name: k3s server をインストールする
      ansible.builtin.shell: |
        set -euo pipefail
        {% if k3s_version | default('') | length > 0 %}
        export INSTALL_K3S_VERSION="{{ k3s_version }}"
        {% endif %}
        {% if k3s_server_exec | default('') | length > 0 %}
        export INSTALL_K3S_EXEC="{{ k3s_server_exec }}"
        {% endif %}
        curl -sfL https://get.k3s.io | sh -
      args:
        executable: /bin/bash
      when:
        - k3s_node_role == 'server'
        - k3s_server_active.stdout | default('') != 'active'

    - name: k3s agent をインストールする
      ansible.builtin.shell: |
        set -euo pipefail
        {% if k3s_version | default('') | length > 0 %}
        export INSTALL_K3S_VERSION="{{ k3s_version }}"
        {% endif %}
        export K3S_URL="{{ k3s_url }}"
        export K3S_TOKEN="{{ k3s_token }}"
        curl -sfL https://get.k3s.io | sh -
      args:
        executable: /bin/bash
      when:
        - k3s_node_role == 'agent'
        - k3s_agent_active.stdout | default('') != 'active'
      no_log: true

    - name: k3s サービスを有効化して起動する
      ansible.builtin.systemd:
        name: "{{ 'k3s-agent' if k3s_node_role == 'agent' else 'k3s' }}"
        state: started
        enabled: true

    - name: kubeconfig 用ディレクトリを用意する
      ansible.builtin.file:
        path: "/home/{{ k3s_kubeconfig_user }}/.kube"
        state: directory
        owner: "{{ k3s_kubeconfig_user }}"
        group: "{{ k3s_kubeconfig_user }}"
        mode: "0700"
      when:
        - k3s_node_role == 'server'
        - k3s_kubeconfig_user | default('') | length > 0

    - name: k3s の kubeconfig をユーザーへコピーする
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ k3s_kubeconfig_user }}/.kube/config"
        owner: "{{ k3s_kubeconfig_user }}"
        group: "{{ k3s_kubeconfig_user }}"
        mode: "0600"
        remote_src: true
      when:
        - k3s_node_role == 'server'
        - k3s_kubeconfig_user | default('') | length > 0

    - name: kubeconfig の API サーバー表記を公開アドレスに置換する
      ansible.builtin.replace:
        path: "/home/{{ k3s_kubeconfig_user }}/.kube/config"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ k3s_public_api }}:6443"
      when:
        - k3s_node_role == 'server'
        - k3s_kubeconfig_user | default('') | length > 0
        - k3s_public_api | default('') | length > 0
